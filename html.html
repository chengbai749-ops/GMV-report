<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>4月GMV目标达成率追踪</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Microsoft YaHei",sans-serif;background:#f0f2f5;padding:20px;color:#333}
.header{text-align:center;margin-bottom:20px}
.header h1{font-size:26px;color:#1a1a1a}
.header .date{color:#888;font-size:13px;margin-top:5px}
.drop-zone{border:3px dashed #bbb;border-radius:12px;padding:35px;text-align:center;margin-bottom:20px;background:#fafafa;transition:all .3s;cursor:pointer}
.drop-zone.dragover{border-color:#5470c6;background:#eef2ff;transform:scale(1.01)}
.drop-zone p{font-size:16px;color:#555}
.drop-zone .hint{font-size:12px;color:#999;margin-top:8px}
.toolbar{display:flex;gap:10px;margin-bottom:18px;align-items:center;flex-wrap:wrap}
.toolbar button{padding:8px 16px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-family:inherit;transition:background .2s}
.btn-danger{background:#ff4d4f;color:#fff}.btn-danger:hover{background:#ff7875}
.btn-info{background:#5470c6;color:#fff}.btn-info:hover{background:#7b9bd6}
.history-info{font-size:13px;color:#666}
.city-section{background:#fff;border-radius:12px;padding:24px;margin-bottom:24px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.city-title{font-size:22px;font-weight:bold;color:#1a1a1a;margin-bottom:8px;border-left:4px solid #5470c6;padding-left:12px}
.kpi-row{display:flex;gap:12px;margin:15px 0;flex-wrap:wrap}
.kpi-card{flex:1;min-width:130px;border-radius:10px;padding:20px;text-align:center;color:#fff}
.kpi-card .label{font-size:16px;opacity:1;font-weight:600}
.kpi-card .value{font-size:34px;font-weight:bold;margin-top:8px}
.kpi-purple{background:linear-gradient(135deg,#667eea,#764ba2)}
.kpi-green{background:linear-gradient(135deg,#11998e,#38ef7d)}
.kpi-orange{background:linear-gradient(135deg,#f093fb,#f5576c)}
.kpi-blue{background:linear-gradient(135deg,#4facfe,#00f2fe)}
.chart-box{height:580px;margin-top:10px}
.path-section{margin-top:20px}
.path-section h3{font-size:16px;margin-bottom:12px;color:#444}
.summary-table{width:auto;border-collapse:collapse;margin-bottom:18px;font-size:13px;table-layout:auto}
.summary-table th{background:#f5f7fa;padding:10px 12px;text-align:center;border:1px solid #e8e8e8;font-weight:600;color:#333;white-space:nowrap}
.summary-table td{padding:9px 12px;text-align:center;border:1px solid #e8e8e8;white-space:nowrap}
.summary-table tr:hover td{background:#fafbfc}
.rate-good{color:#52c41a;font-weight:bold}
.rate-warn{color:#faad14;font-weight:bold}
.rate-bad{color:#ff4d4f;font-weight:bold}
.path-charts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(480px,1fr));gap:16px}
.path-chart-item{height:360px;background:#fafbfc;border-radius:8px;border:1px solid #eee}
.path-block{background:#fafbfc;border-radius:10px;padding:18px 20px;margin:16px 0;border:1px solid #eee}
.block-title{font-size:17px;font-weight:bold;color:#1a1a1a;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid #e8e8e8}
.toast{position:fixed;top:20px;right:20px;padding:12px 20px;border-radius:8px;color:#fff;font-size:14px;z-index:9999;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}.toast.success{background:#52c41a}.toast.error{background:#ff4d4f}.toast.info{background:#1890ff}
.note{text-align:center;color:#999;font-size:12px;margin-top:24px}
.tab-bar{display:flex;gap:0;margin-bottom:20px;border-bottom:2px solid #e8e8e8}
.tab-btn{padding:10px 28px;border:none;background:none;cursor:pointer;font-size:15px;font-family:inherit;color:#666;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s}
.tab-btn:hover{color:#5470c6}
.tab-btn.active{color:#5470c6;font-weight:bold;border-bottom-color:#5470c6}
.tab-content{display:none}
.tab-content.active{display:block}
.analysis-box{background:#f8faff;border-left:4px solid #5470c6;border-radius:0 8px 8px 0;padding:14px 18px;margin:12px 0 18px 0;font-size:13px;line-height:1.8;color:#444}
.analysis-box .analysis-title{font-weight:bold;color:#333;margin-bottom:6px;font-size:14px}
.analysis-box .highlight-good{color:#52c41a;font-weight:bold}
.analysis-box .highlight-warn{color:#faad14;font-weight:bold}
.analysis-box .highlight-bad{color:#ff4d4f;font-weight:bold}
.analysis-box .highlight-info{color:#5470c6;font-weight:bold}
.analysis-box ul{margin:4px 0 0 18px;padding:0}
.analysis-box li{margin-bottom:2px}
.path-analysis-box{background:#fffbe6;border-left:4px solid #faad14;border-radius:0 8px 8px 0;padding:10px 14px;margin:8px 0 14px 0;font-size:12px;line-height:1.7;color:#555}
</style>
</head>
<body>
<div class="header">
  <h1>📊 4月GMV目标达成率追踪</h1>
  <div class="date" id="reportDate"></div>
</div>
<div class="drop-zone" id="dropZone">
  <p>📂 将Excel文件拖拽到此处，或点击选择文件</p>
  <div class="hint">支持多Sheet（Sheet名用日期命名，如 04-13）；也支持单Sheet当天数据</div>
  <input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none">
</div>
<div class="toolbar">
  <span class="history-info" id="historyInfo">暂无历史数据</span>
  <button class="btn-info" onclick="exportCSV()">📥 导出CSV</button>
  <button class="btn-info" onclick="downloadHTML()" style="background:#13c2c2">📄 下载当前页面</button>
  <button class="btn-danger" onclick="clearHistory()">🗑️ 清空历史</button>
</div>
<div class="tab-bar" id="tabBar">
  <button class="tab-btn active" data-tab="overview" onclick="switchTab('overview')">总览</button>
  <button class="tab-btn" data-tab="武汉" onclick="switchTab('武汉')">武汉</button>
  <button class="tab-btn" data-tab="长沙" onclick="switchTab('长沙')">长沙</button>
  <button class="tab-btn" data-tab="合肥" onclick="switchTab('合肥')">合肥</button>
</div>
<div id="tab-overview" class="tab-content active"></div>
<div id="tab-武汉" class="tab-content"></div>
<div id="tab-长沙" class="tab-content"></div>
<div id="tab-合肥" class="tab-content"></div>
<div class="note">拖入Excel自动解析 | 数据保存在浏览器本地存储</div>
<div class="toast" id="toast"></div>

<script>
// ========== 常量 ==========
var APRIL_DAYS = 30;
var STORAGE_KEY = 'gmv_history_v2';

// 2026年4月节假日/休息日配置
// 清明节: 4/4(六)-4/6(一调休)；周末自动计算
var APRIL_HOLIDAYS_MANUAL = { 6: '清明节' };
function isHoliday(day) {
  if (APRIL_HOLIDAYS_MANUAL[day]) return true;
  var date = new Date(2026, 3, day); // 月份0-indexed
  var dow = date.getDay();
  return dow === 0 || dow === 6;
}
function holidayLabel(day) {
  if (APRIL_HOLIDAYS_MANUAL[day]) return APRIL_HOLIDAYS_MANUAL[day];
  var date = new Date(2026, 3, day);
  var dow = date.getDay();
  if (dow === 0 || dow === 6) return '周末';
  return '';
}

// 2026年4月每日天气数据
var APRIL_WEATHER = {
  '武汉': { 1:'雾转阴',2:'小雨',3:'阴转雾',4:'多云',5:'阴转雾',6:'雾转小雨',7:'阴转小雨',8:'中雨转大暴雨',9:'大雨转雾',10:'阴转小雨',11:'小雨',12:'多云',13:'小雨',14:'小雨转雾',15:'小雨',16:'多云转雾',17:'多云转雾',18:'多云转雾',19:'晴转雾',20:'小雨',21:'小雨',22:'阴',23:'阴转晴',24:'多云转雾',25:'晴转多云',26:'晴转阴',27:'中雨转大暴雨',28:'中雨转小雨',29:'多云',30:'晴' },
  '长沙': { 1:'雾转阴',2:'中雨转大雨',3:'小雨转雾',4:'雾转多云',5:'中雨转小雨',6:'小雨',7:'小雨',8:'小雨转多云',9:'中雨',10:'大雨',11:'小雨',12:'小雨转雾',13:'小雨',14:'中雨转小雨',15:'中雨转小雨',16:'小雨转雾',17:'晴转雾',18:'晴转雾',19:'晴转阴',20:'中雨',21:'中雨转大雨',22:'小雨转多云',23:'多云转雾',24:'多云转雾',25:'晴',26:'晴转多云',27:'小雨转暴雨',28:'大雨转小雨',29:'多云转晴',30:'晴' },
  '合肥': { 1:'雾转晴',2:'多云转小雨',3:'小雨转雾',4:'雾转晴',5:'多云',6:'多云',7:'多云转晴',8:'中雨转大雨',9:'小雨转雾',10:'阵雨转雾',11:'小雨转雾',12:'小雨转雾',13:'小雨',14:'小雨转雾',15:'阴转雾',16:'小雨转雾',17:'多云转雾',18:'晴转雾',19:'晴转多云',20:'小雨转阴',21:'小雨',22:'小雨',23:'小雨转雾',24:'晴转雾',25:'晴转雾',26:'晴',27:'小雨',28:'小雨',29:'多云',30:'晴' }
};
function weatherIcon(text) {
  if (!text) return '';
  if (/暴雨/.test(text)) return '⛈';
  if (/大雨/.test(text)) return '🌧';
  if (/中雨/.test(text)) return '🌧';
  if (/阵雨/.test(text)) return '🌦';
  if (/小雨/.test(text)) return '🌦';
  if (/雨/.test(text)) return '🌧';
  if (/雾/.test(text)) return '🌫';
  if (/阴/.test(text)) return '☁';
  if (/多云/.test(text)) return '⛅';
  if (/晴/.test(text)) return '☀';
  return '';
}
function getWeatherLabel(city, day) {
  if (city === '总览') return '';
  var w = APRIL_WEATHER[city];
  if (!w || !w[day]) return '';
  return simplifyWeather(w[day]);
}

function simplifyWeather(text) {
  if (!text) return '';
  if (text.indexOf('转') >= 0) {
    var parts = text.split('转');
    var priority = ['晴', '多云', '阴', '小雨', '阵雨', '中雨', '大雨', '暴雨', '雷阵雨', '雪'];
    var bestIdx = 999;
    var bestText = parts[0].trim();
    parts.forEach(function(p) {
      var pt = p.trim();
      for (var i = 0; i < priority.length; i++) {
        if (pt.indexOf(priority[i]) >= 0) {
          if (i < bestIdx) { bestIdx = i; bestText = priority[i]; }
          break;
        }
      }
    });
    return bestText;
  }
  var keywords = ['晴', '多云', '阴', '小雨', '阵雨', '中雨', '大雨', '暴雨', '雷阵雨', '雪', '雾'];
  for (var i = 0; i < keywords.length; i++) {
    if (text.indexOf(keywords[i]) >= 0) return keywords[i];
  }
  return text;
}

function isRainyWeather(text) {
  if (!text) return false;
  return /雨|雷/.test(text);
}

function getWeatherText(city, day) {
  if (city === '总览') return '';
  var w = APRIL_WEATHER[city];
  if (!w || !w[day]) return '';
  return w[day];
}
var CITIES = ['武汉', '长沙', '合肥'];
var CITY_CONFIG = {
  '武汉': { headerRow: 1, dataStart: 3, totalRow: 11 },
  '长沙': { headerRow: 14, dataStart: 16, totalRow: 24 },
  '合肥': { headerRow: 27, dataStart: 29, totalRow: 37 }
};
var PATH_LIST = ['端内', '美团无人点位', '美团有人门店', '美团码', '抖音', '闲鱼', '小红书'];
var ALL_PATHS = ['端内', '美团无人点位', '美团有人门店', '美团码', '抖音', '闲鱼', '小红书', '线上合计', '线上+端内合计'];

// ========== 工具函数 ==========
function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show ' + type;
  setTimeout(function() { t.className = 'toast'; }, 3000);
}
function loadHistory() { var r = localStorage.getItem(STORAGE_KEY); return r ? JSON.parse(r) : []; }
function saveHistory(d) { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); }
function clearHistory() { if (!confirm('确定清空所有历史数据？')) return; localStorage.removeItem(STORAGE_KEY); showToast('历史数据已清空', 'info'); renderAll(); }
function numVal(v) { if (v == null || v === '') return null; var n = Number(v); return isNaN(n) ? null : n; }
function rateVal(v) {
  if (v == null || v === '') return null;
  // Excel百分比格式读出来始终是小数（如93.1%→0.931），直接返回
  if (typeof v === 'number') return v;
  // 字符串形式如 "93.1%" 需要去掉%再除以100
  var s = String(v).replace(/[%％]/g, '').trim();
  var n = Number(s);
  if (isNaN(n)) return null;
  return n / 100;
}
function fmtRate(v) { if (v == null) return '-'; return (v * 100).toFixed(1) + '%'; }
function rateClass(rate, timeProg) {
  if (rate == null) return '';
  var r = rate * 100, t = (timeProg || 0) * 100;
  if (r >= t) return 'rate-good';
  if (r >= t * 0.8) return 'rate-warn';
  return 'rate-bad';
}
function exportCSV() {
  var data = loadHistory(); if (!data.length) { showToast('没有数据可导出', 'error'); return; }
  var cols = ['日期','城市','达成路径','3月收入','4月目标','截止到T-1','4月达成率'];
  var csv = '\uFEFF' + cols.join(',') + '\n';
  data.forEach(function(r) { csv += cols.map(function(c) { return r[c] != null ? r[c] : ''; }).join(',') + '\n'; });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8' }));
  a.download = '4月GMV历史数据.csv'; a.click(); showToast('CSV已导出', 'success');
}
function downloadHTML() {
  var html = document.documentElement.outerHTML;
  var blob = new Blob(['<!DOCTYPE html>\n' + html], { type: 'text/html;charset=utf-8' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  var today = new Date();
  var dateStr = today.getFullYear() + String(today.getMonth() + 1).padStart(2, '0') + String(today.getDate()).padStart(2, '0');
  a.download = '4月GMV达成率报告_' + dateStr + '.html';
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('页面已下载', 'success');
}

// ========== 系统时间：昨天 ==========
function getYesterday() {
  var now = new Date();
  var y = new Date(now.getFullYear(), now.getMonth(), now.getDate() - 1);
  return {
    str: y.getFullYear() + '-' + String(y.getMonth() + 1).padStart(2, '0') + '-' + String(y.getDate()).padStart(2, '0'),
    day: y.getDate(),
    daysInMonth: new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate()
  };
}

// ========== Excel解析 ==========
function parseSheetDate(name) {
  var m = name.match(/^(\d{1,2})-(\d{1,2})$/);
  if (m) return '2026-' + m[1].padStart(2, '0') + '-' + m[2].padStart(2, '0');
  m = name.match(/^(\d{2})(\d{2})$/);
  if (m) return '2026-' + m[1] + '-' + m[2];
  m = name.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
  if (m) return m[1] + '-' + m[2].padStart(2, '0') + '-' + m[3].padStart(2, '0');
  return null;
}
function parseExcel(buf) {
  var wb = XLSX.read(buf, { type: 'array' });
  var records = [], importedDates = [];
  wb.SheetNames.forEach(function(sn) {
    var dateStr = parseSheetDate(sn.trim());
    if (!dateStr) {
      var yd = getYesterday();
      dateStr = yd.str;
    }
    var rows = XLSX.utils.sheet_to_json(wb.Sheets[sn], { header: 1, defval: null });
    if (rows.length < 10) return; // 跳过空Sheet
    CITIES.forEach(function(city) {
      var cfg = CITY_CONFIG[city]; if (!cfg) return;
      PATH_LIST.forEach(function(pn, idx) {
        var row = rows[cfg.dataStart + idx]; if (!row) return;
        var target = numVal(row[3]);
        var current = numVal(row[4]);
        var rate = rateVal(row[5]);
        // 当有目标和截止T-1数据时，用实际值计算达成率（避免Excel达成率字段异常）
        if (target != null && target > 0 && current != null) {
          rate = current / target;
        }
        records.push({ '日期': dateStr, '城市': city, '达成路径': pn,
          '3月收入': numVal(row[2]), '4月目标': target, '截止到T-1': current,
          '4月达成率': rate });
      });
      var rOn = rows[cfg.totalRow - 1];
      if (rOn) {
        var onTarget = numVal(rOn[3]), onCurrent = numVal(rOn[4]), onRate = rateVal(rOn[5]);
        if (onTarget != null && onTarget > 0 && onCurrent != null) onRate = onCurrent / onTarget;
        records.push({ '日期': dateStr, '城市': city, '达成路径': '线上合计',
          '3月收入': numVal(rOn[2]), '4月目标': onTarget, '截止到T-1': onCurrent,
          '4月达成率': onRate });
      }
      var rT = rows[cfg.totalRow];
      if (rT) {
        var tTarget = numVal(rT[3]), tCurrent = numVal(rT[4]), tRate = rateVal(rT[5]);
        if (tTarget != null && tTarget > 0 && tCurrent != null) tRate = tCurrent / tTarget;
        records.push({ '日期': dateStr, '城市': city, '达成路径': '线上+端内合计',
          '3月收入': numVal(rT[2]), '4月目标': tTarget, '截止到T-1': tCurrent,
          '4月达成率': tRate });
      }
    });
    importedDates.push(dateStr);
  });
  return { records: records, importedDates: importedDates };
}
function mergeData(existing, newRecs) {
  var newDates = {};
  newRecs.forEach(function(r) { newDates[r['日期']] = true; });
  return existing.filter(function(r) { return !newDates[r['日期']]; }).concat(newRecs);
}
function handleFile(file) {
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var result = parseExcel(e.target.result);
      if (!result.records.length) { showToast('未识别到有效数据，请检查Sheet命名', 'error'); return; }
      saveHistory(mergeData(loadHistory(), result.records));
      var uniqueDates = [];
      result.importedDates.forEach(function(d) { if (uniqueDates.indexOf(d) === -1) uniqueDates.push(d); });
      showToast('✅ 导入成功！共 ' + uniqueDates.length + ' 天数据', 'success');
      renderAll();
    } catch (err) { showToast('解析失败: ' + err.message, 'error'); console.error(err); }
  };
  reader.readAsArrayBuffer(file);
}

// ========== 拖拽绑定 ==========
// 全局阻止默认拖拽行为
document.addEventListener('dragover', function(e) { e.preventDefault(); e.stopPropagation(); }, false);
document.addEventListener('drop', function(e) { e.preventDefault(); e.stopPropagation(); }, false);

var dropZone = document.getElementById('dropZone');
var fileInput = document.getElementById('fileInput');
dropZone.addEventListener('click', function() { fileInput.click(); });
fileInput.addEventListener('change', function(e) { handleFile(e.target.files[0]); fileInput.value = ''; });
dropZone.addEventListener('dragover', function(e) { e.preventDefault(); e.stopPropagation(); dropZone.classList.add('dragover'); }, false);
dropZone.addEventListener('dragleave', function() { dropZone.classList.remove('dragover'); });
dropZone.addEventListener('drop', function(e) {
  e.preventDefault(); e.stopPropagation(); dropZone.classList.remove('dragover');
  var f = e.dataTransfer.files[0];
  if (f && (f.name.endsWith('.xlsx') || f.name.endsWith('.xls'))) handleFile(f);
  else showToast('请拖入 .xlsx 文件', 'error');
}, false);
</script>
<script>
// ========== Tab切换 ==========
var currentTab = 'overview';
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(function(btn) {
    btn.classList.toggle('active', btn.getAttribute('data-tab') === tab);
  });
  document.querySelectorAll('.tab-content').forEach(function(el) {
    el.classList.toggle('active', el.id === 'tab-' + tab);
  });
  // 切换tab后需要resize图表，否则隐藏时初始化的图表尺寸不对
  setTimeout(function() { allCharts.forEach(function(c) { c.resize(); }); }, 50);
}

// ========== 数据准备 ==========
function prepareChartData(allData) {
  var cityDaily = {};
  CITIES.forEach(function(c) { cityDaily[c] = {}; });
  allData.forEach(function(row) {
    var city = row['城市'], date = row['日期'], path = row['达成路径'];
    if (!cityDaily[city]) return;
    if (!cityDaily[city][date]) cityDaily[city][date] = {};
    cityDaily[city][date][path] = row;
  });
  var yest = getYesterday();
  var timeProg = yest.day / yest.daysInMonth;
  var result = {};
  CITIES.forEach(function(city) {
    var dates = Object.keys(cityDaily[city]).sort();
    if (!dates.length) return;
    var gmvSeries = [];
    var targetVal = null;
    dates.forEach(function(d) {
      var total = cityDaily[city][d]['线上+端内合计'] || {};
      var gmv = total['截止到T-1'];
      if (gmv != null) gmvSeries.push({ date: d, gmv: gmv, apr_rate: total['4月达成率'] });
      if (targetVal == null && total['4月目标']) targetVal = total['4月目标'];
    });
    var latestDate = dates[dates.length - 1];
    var latestData = cityDaily[city][latestDate];
    var latestTotal = latestData['线上+端内合计'] || {};
    // 如果最新日期的汇总数据为空，往前找有实际数据的日期
    if (latestTotal['截止到T-1'] == null && latestTotal['4月达成率'] == null) {
      for (var ti = dates.length - 2; ti >= 0; ti--) {
        var testTotal = (cityDaily[city][dates[ti]] || {})['线上+端内合计'] || {};
        if (testTotal['截止到T-1'] != null || testTotal['4月达成率'] != null) {
          latestTotal = testTotal;
          latestDate = dates[ti];
          latestData = cityDaily[city][latestDate];
          break;
        }
      }
    }

    var pathSummary = [];
    var pathDaily = {};
    // 找到有实际数据的最新日期（避免最新日期数据全为null导致表格空白）
    var summaryDate = latestDate;
    for (var di = dates.length - 1; di >= 0; di--) {
      var testData = cityDaily[city][dates[di]];
      var hasValue = false;
      ALL_PATHS.forEach(function(pn) {
        var tr = testData[pn];
        if (tr && (tr['截止到T-1'] != null || tr['4月达成率'] != null || tr['4月目标'] != null)) hasValue = true;
      });
      if (hasValue) { summaryDate = dates[di]; break; }
    }
    var summaryData = cityDaily[city][summaryDate];
    ALL_PATHS.forEach(function(pn) {
      var r = summaryData[pn];
      if (r) pathSummary.push({ name: pn, marchRev: r['3月收入'], target: r['4月目标'], current: r['截止到T-1'], rate: r['4月达成率'] });
      pathDaily[pn] = [];
      dates.forEach(function(d) {
        var pr = (cityDaily[city][d] || {})[pn];
        if (pr) pathDaily[pn].push({ date: d, current: pr['截止到T-1'], rate: pr['4月达成率'], target: pr['4月目标'] });
      });
    });
    result[city] = { gmvSeries: gmvSeries, targetVal: targetVal,
      aprRate: latestTotal['4月达成率'],
      timeProg: timeProg, latestDate: latestDate, pathSummary: pathSummary, pathDaily: pathDaily, dates: dates };
  });

  // ===== 汇总总览数据：将三个城市按日期、路径求和 =====
  var allDatesMap = {};
  CITIES.forEach(function(city) {
    if (!result[city]) return;
    result[city].dates.forEach(function(d) { allDatesMap[d] = true; });
  });
  var overviewDates = Object.keys(allDatesMap).sort();
  if (overviewDates.length > 0) {
    var overviewGmvSeries = [];
    var overviewTargetVal = 0;
    CITIES.forEach(function(city) {
      if (result[city] && result[city].targetVal) overviewTargetVal += result[city].targetVal;
    });

    // 按日期汇总GMV
    overviewDates.forEach(function(d) {
      var totalGmv = 0, hasData = false, totalTarget = 0, totalCurrent = 0;
      CITIES.forEach(function(city) {
        if (!result[city]) return;
        var found = result[city].gmvSeries.filter(function(x) { return x.date === d; });
        if (found.length > 0 && found[0].gmv != null) { totalGmv += found[0].gmv; hasData = true; }
      });
      // 计算汇总达成率
      var overviewRate = overviewTargetVal > 0 ? totalGmv / overviewTargetVal : null;
      if (hasData) overviewGmvSeries.push({ date: d, gmv: totalGmv, apr_rate: overviewRate });
    });

    // 按路径汇总
    var overviewPathSummary = [];
    var overviewPathDaily = {};
    ALL_PATHS.forEach(function(pn) {
      var marchSum = 0, targetSum = 0, currentSum = 0, hasAny = false;
      CITIES.forEach(function(city) {
        if (!result[city]) return;
        result[city].pathSummary.forEach(function(p) {
          if (p.name === pn) {
            if (p.marchRev != null) marchSum += p.marchRev;
            if (p.target != null) targetSum += p.target;
            if (p.current != null) { currentSum += p.current; hasAny = true; }
          }
        });
      });
      var rateSum = targetSum > 0 && hasAny ? currentSum / targetSum : null;
      if (hasAny || targetSum > 0) {
        overviewPathSummary.push({ name: pn, marchRev: marchSum || null, target: targetSum || null, current: hasAny ? currentSum : null, rate: rateSum });
      }

      // 按日期汇总各路径
      overviewPathDaily[pn] = [];
      overviewDates.forEach(function(d) {
        var dCurrent = 0, dTarget = 0, dHas = false;
        CITIES.forEach(function(city) {
          if (!result[city] || !result[city].pathDaily[pn]) return;
          result[city].pathDaily[pn].forEach(function(pd) {
            if (pd.date === d) {
              if (pd.current != null) { dCurrent += pd.current; dHas = true; }
              if (pd.target != null) dTarget += pd.target;
            }
          });
        });
        if (dHas) {
          var dRate = dTarget > 0 ? dCurrent / dTarget : null;
          overviewPathDaily[pn].push({ date: d, current: dCurrent, rate: dRate, target: dTarget || null });
        }
      });
    });

    var latestOverviewGmv = overviewGmvSeries.length > 0 ? overviewGmvSeries[overviewGmvSeries.length - 1] : {};
    result['总览'] = {
      gmvSeries: overviewGmvSeries,
      targetVal: overviewTargetVal,
      aprRate: latestOverviewGmv.apr_rate || null,
      timeProg: timeProg,
      latestDate: overviewDates[overviewDates.length - 1],
      pathSummary: overviewPathSummary,
      pathDaily: overviewPathDaily,
      dates: overviewDates
    };
  }

  return result;
}

// ========== 分析文字生成 ==========
function generateCityAnalysis(city, d) {
  if (!d || !d.gmvSeries.length) return '';
  var displayName = city === '总览' ? '三城市合计' : city;
  var latest = d.gmvSeries[d.gmvSeries.length - 1];
  var latestGMV = latest.gmv;
  var aprRate = d.aprRate;
  var timeProg = d.timeProg;
  var targetVal = d.targetVal || 0;
  var timeProgPct = (timeProg * 100).toFixed(1);
  var aprRatePct = aprRate != null ? (aprRate * 100).toFixed(1) : null;
  var gap = targetVal - latestGMV;
  var remainDays = 30 - getYesterday().day;
  var dailyNeeded = remainDays > 0 ? gap / remainDays : 0;

  // 趋势分析：最近3天的GMV增速
  var recentGrowths = [];
  for (var i = d.gmvSeries.length - 1; i >= 1 && recentGrowths.length < 3; i--) {
    var prev = d.gmvSeries[i - 1].gmv;
    var curr = d.gmvSeries[i].gmv;
    if (prev != null && curr != null && prev > 0) {
      recentGrowths.push(curr - prev);
    }
  }
  var avgDailyGrowth = recentGrowths.length > 0 ? recentGrowths.reduce(function(a, b) { return a + b; }, 0) / recentGrowths.length : 0;

  var html = '<div class="analysis-box">';
  html += '<div class="analysis-title">📝 ' + displayName + ' GMV整体分析</div>';
  html += '<ul>';

  // 达成率 vs 时间进度
  if (aprRatePct != null) {
    var diff = (aprRate - timeProg) * 100;
    if (diff >= 0) {
      html += '<li>截至最新数据日，' + displayName + '累计GMV为 <span class="highlight-info">¥' + (latestGMV / 10000).toFixed(2) + '万</span>，4月达成率 <span class="highlight-good">' + aprRatePct + '%</span>，<span class="highlight-good">领先</span>时间进度（' + timeProgPct + '%）<span class="highlight-good">' + diff.toFixed(1) + '个百分点</span>，整体节奏良好。</li>';
    } else {
      html += '<li>截至最新数据日，' + displayName + '累计GMV为 <span class="highlight-info">¥' + (latestGMV / 10000).toFixed(2) + '万</span>，4月达成率 <span class="highlight-bad">' + aprRatePct + '%</span>，<span class="highlight-bad">落后</span>时间进度（' + timeProgPct + '%）<span class="highlight-bad">' + Math.abs(diff).toFixed(1) + '个百分点</span>，需加快推进。</li>';
    }
  }

  // 距离目标的差距
  if (targetVal > 0 && gap > 0) {
    html += '<li>距4月目标（¥' + (targetVal / 10000).toFixed(2) + '万）还差 <span class="highlight-warn">¥' + (gap / 10000).toFixed(2) + '万</span>，剩余 ' + remainDays + ' 天，日均需完成 <span class="highlight-warn">¥' + (dailyNeeded / 10000).toFixed(2) + '万</span>。</li>';
  } else if (gap <= 0) {
    html += '<li>🎉 已达成4月目标（¥' + (targetVal / 10000).toFixed(2) + '万），超额完成 <span class="highlight-good">¥' + (Math.abs(gap) / 10000).toFixed(2) + '万</span>。</li>';
  }

  // 近期增长趋势
  if (avgDailyGrowth > 0) {
    html += '<li>近期日均增长约 <span class="highlight-info">¥' + (avgDailyGrowth / 10000).toFixed(2) + '万</span>';
    if (gap > 0 && remainDays > 0) {
      if (avgDailyGrowth >= dailyNeeded) {
        html += '，按当前增速<span class="highlight-good">有望达成目标</span>。';
      } else {
        var shortfall = ((dailyNeeded - avgDailyGrowth) / 10000).toFixed(2);
        html += '，距所需日均增速还差 <span class="highlight-bad">¥' + shortfall + '万/天</span>，需提升增长动力。';
      }
    }
    html += '</li>';
  }

  html += '</ul></div>';
  return html;
}

function generateTableAnalysis(city, d) {
  if (!d || !d.pathSummary.length) return '';
  var displayName = city === '总览' ? '三城市合计' : city;
  var timeProg = d.timeProg;
  var good = [], warn = [], bad = [], noData = [];

  d.pathSummary.forEach(function(p) {
    if (p.name === '线上合计' || p.name === '线上+端内合计') return;
    if (p.rate == null) { noData.push(p.name); return; }
    var ratePct = p.rate * 100;
    var timeProgPct = timeProg * 100;
    if (ratePct >= timeProgPct) good.push(p);
    else if (ratePct >= timeProgPct * 0.8) warn.push(p);
    else bad.push(p);
  });

  // 找线上合计和线上+端内合计
  var onlineTotal = null, grandTotal = null;
  d.pathSummary.forEach(function(p) {
    if (p.name === '线上合计') onlineTotal = p;
    if (p.name === '线上+端内合计') grandTotal = p;
  });

  var html = '<div class="analysis-box">';
  html += '<div class="analysis-title">📊 ' + displayName + ' 各路径达成情况分析</div>';
  html += '<ul>';

  if (good.length > 0) {
    html += '<li><span class="highlight-good">表现优秀（达成率≥时间进度）：</span>' + good.map(function(p) {
      return p.name + '（' + (p.rate * 100).toFixed(1) + '%）';
    }).join('、') + '。';
    // 找最优
    var best = good.reduce(function(a, b) { return (a.rate || 0) > (b.rate || 0) ? a : b; });
    html += '其中 <span class="highlight-good">' + best.name + '</span> 达成率最高。</li>';
  }

  if (warn.length > 0) {
    html += '<li><span class="highlight-warn">需关注（达成率接近时间进度）：</span>' + warn.map(function(p) {
      return p.name + '（' + (p.rate * 100).toFixed(1) + '%）';
    }).join('、') + '，建议加大投入力度。</li>';
  }

  if (bad.length > 0) {
    html += '<li><span class="highlight-bad">明显落后（达成率远低于时间进度）：</span>' + bad.map(function(p) {
      return p.name + '（' + (p.rate * 100).toFixed(1) + '%）';
    }).join('、') + '，需重点关注并制定追赶计划。</li>';
  }

  if (noData.length > 0) {
    html += '<li>暂无数据的路径：' + noData.join('、') + '。</li>';
  }

  // 线上 vs 端内对比
  var offline = d.pathSummary.find(function(p) { return p.name === '端内'; });
  if (offline && onlineTotal && offline.rate != null && onlineTotal.rate != null) {
    var offRate = (offline.rate * 100).toFixed(1);
    var onRate = (onlineTotal.rate * 100).toFixed(1);
    if (offline.rate > onlineTotal.rate) {
      html += '<li>端内达成率（' + offRate + '%）<span class="highlight-good">高于</span>线上合计（' + onRate + '%），端内渠道表现更强。</li>';
    } else {
      html += '<li>线上合计达成率（' + onRate + '%）<span class="highlight-good">高于</span>端内（' + offRate + '%），线上渠道表现更强。</li>';
    }
  }

  html += '</ul></div>';
  return html;
}

function generatePathAnalysis(pn, pData, timeProg) {
  if (!pData || pData.length < 2) return '';
  var latest = pData[pData.length - 1];
  if (latest.current == null) return '';

  var ratePct = latest.rate != null ? (latest.rate * 100).toFixed(1) : null;
  var timeProgPct = (timeProg * 100).toFixed(1);

  // 计算近期增速
  var recentGrowths = [];
  for (var i = pData.length - 1; i >= 1 && recentGrowths.length < 3; i--) {
    if (pData[i].current != null && pData[i - 1].current != null) {
      recentGrowths.push(pData[i].current - pData[i - 1].current);
    }
  }
  var avgGrowth = recentGrowths.length > 0 ? recentGrowths.reduce(function(a, b) { return a + b; }, 0) / recentGrowths.length : 0;

  var html = '<div class="path-analysis-box">';
  html += '📌 <b>' + pn + '</b>：';

  if (ratePct != null) {
    var diff = latest.rate - timeProg;
    if (diff >= 0) {
      html += '达成率 <span style="color:#52c41a;font-weight:bold">' + ratePct + '%</span>，领先时间进度 ' + (diff * 100).toFixed(1) + ' 个百分点。';
    } else {
      html += '达成率 <span style="color:#ff4d4f;font-weight:bold">' + ratePct + '%</span>，落后时间进度 ' + Math.abs(diff * 100).toFixed(1) + ' 个百分点。';
    }
  }

  html += '累计收入 ¥' + (latest.current / 10000).toFixed(2) + '万';
  if (latest.target) {
    var remaining = latest.target - latest.current;
    if (remaining > 0) {
      html += '，距目标还差 ¥' + (remaining / 10000).toFixed(2) + '万';
    } else {
      html += '，已超额完成目标';
    }
  }
  html += '。';

  if (avgGrowth > 0) {
    html += '近期日均增长约 ¥' + (avgGrowth / 10000).toFixed(2) + '万。';
  }

  html += '</div>';
  return html;
}

renderAll();
